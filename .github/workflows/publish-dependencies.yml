name: Publish dependency packages

# One-time workflow to publish inference packages to GitHub Packages.
# Run this manually when inference repos update but don't auto-publish.

on:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  NUGET_SOURCE: https://nuget.pkg.github.com/luisquintanilla/index.json

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build text inference packages
        run: |
          git clone https://github.com/luisquintanilla/mlnet-text-inference-custom-transforms.git ./text-inference
          dotnet pack ./text-inference -c Release -o ./packages
          rm -rf ./text-inference

      - name: Build image inference packages
        run: |
          git clone https://github.com/luisquintanilla/mlnet-image-inference-custom-transforms.git ./image-inference
          dotnet pack ./image-inference -c Release -o ./packages
          rm -rf ./image-inference

      - name: Build audio inference packages
        run: |
          git clone https://github.com/luisquintanilla/mlnet-audio-custom-transforms.git ./audio-inference
          dotnet pack ./audio-inference -c Release -o ./packages
          rm -rf ./audio-inference

      - name: List packages
        run: ls -la ./packages/

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push ./packages/MLNet.*.nupkg \
            --source ${{ env.NUGET_SOURCE }} \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
