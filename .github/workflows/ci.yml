name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  NUGET_SOURCE: https://nuget.pkg.github.com/luisquintanilla/index.json

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    permissions:
      contents: write    # needed for creating releases
      packages: write    # needed for pushing to GitHub Packages

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Configure GitHub Packages auth
        run: dotnet nuget update source github --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Build local dependencies from source
        shell: bash
        run: |
          # Build text inference packages (MLNet.TextInference.Onnx, etc.)
          git clone --depth 1 https://github.com/luisquintanilla/mlnet-text-inference-custom-transforms.git ./temp-text-inference
          dotnet pack ./temp-text-inference -c Release -o ./local-packages -p:MinVerVersionOverride=0.1.0-preview.1
          rm -rf ./temp-text-inference

          # Build image inference packages (MLNet.ImageInference.Onnx, MLNet.ImageGeneration.OnnxGenAI)
          git clone --depth 1 https://github.com/luisquintanilla/mlnet-image-inference-custom-transforms.git ./temp-image-inference
          dotnet pack ./temp-image-inference -c Release -o ./local-packages -p:MinVerVersionOverride=0.1.0-preview.1
          rm -rf ./temp-image-inference

          # Build audio inference packages (MLNet.AudioInference.Onnx)
          git clone --depth 1 https://github.com/luisquintanilla/mlnet-audio-custom-transforms.git ./temp-audio-inference
          dotnet pack ./temp-audio-inference -c Release -o ./local-packages -p:MinVerVersionOverride=0.1.0-preview.2
          rm -rf ./temp-audio-inference

          # Build ModelPackages
          git clone --depth 1 https://github.com/luisquintanilla/model-packages-prototype.git ./temp-model-packages
          mkdir -p ./temp-model-packages/local-packages
          dotnet pack ./temp-model-packages/src/ModelPackages/ModelPackages.csproj -c Release -o ./local-packages -p:Version=0.1.0-preview.15
          rm -rf ./temp-model-packages

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      # Determine version: tag-based for releases, preview suffix for dev builds.
      # Each package defines its own VersionPrefix (defaults to 0.1.0 from Directory.Build.props).
      # Dev builds append -preview.N suffix; release builds use the csproj version as-is.
      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "Release build — using per-package VersionPrefix from csproj"
          else
            echo "version_suffix=preview.${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Preview build — suffix: preview.${{ github.run_number }}"
          fi

      - name: Pack
        run: |
          if [[ "${{ steps.version.outputs.is_release }}" == "true" ]]; then
            dotnet pack -c Release --no-build -o ./artifacts
          else
            dotnet pack -c Release --no-build -o ./artifacts -p:VersionSuffix=${{ steps.version.outputs.version_suffix }}
          fi
        shell: bash

      - name: List packages
        shell: bash
        run: ls -la ./artifacts/

      # Push to GitHub Packages (main branch only, Ubuntu only to avoid duplicate pushes)
      - name: Push to GitHub Packages
        if: github.event_name == 'push' && matrix.os == 'ubuntu-latest'
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source ${{ env.NUGET_SOURCE }} \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

      # Create GitHub Release with .nupkg assets (tags only, Ubuntu only)
      - name: Create GitHub Release
        if: steps.version.outputs.is_release == 'true' && matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.*nupkg
          generate_release_notes: true
